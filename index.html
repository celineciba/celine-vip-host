<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CÉLINE VIP HOST</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#070707;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrap{
width:420px;
}

.brand{
text-align:center;
letter-spacing:8px;
font-weight:800;
font-size:34px;
color:#d6b15e;
}

.sub{
text-align:center;
margin-bottom:20px;
}

.card{
background:#111;
border-radius:16px;
padding:20px;
border:1px solid rgba(214,177,94,.3);
}

label{
font-size:12px;
color:#bbb;
display:block;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
}

.btn{
width:100%;
margin-top:15px;
padding:12px;
border-radius:12px;
border:none;
font-weight:bold;
background:linear-gradient(90deg,#b88a2a,#d6b15e);
cursor:pointer;
}

.btn.secondary{
background:#111;
border:1px solid #d6b15e;
color:#d6b15e;
}

.hidden{
display:none;
}

.voucherCanvas{
width:420px;
aspect-ratio:9/16;
border-radius:16px;
overflow:hidden;
position:relative;
background:url("plantilla.jpg") center/cover no-repeat;
}

.vText{
position:absolute;
left:10%;
right:10%;
text-align:center;
}

.vName{
top:26%;
font-size:18px;
font-weight:bold;
}

.vMeta{
top:32%;
font-size:14px;
}

.barcodeBox{
position:absolute;
left:12%;
right:12%;
top:42%;
text-align:center;
}

#barcode{
width:100%;
height:70px;
}

.vCode{
margin-top:6px;
color:#d6b15e;
font-weight:bold;
}

.benefits{
position:absolute;
left:12%;
right:12%;
top:60%;
font-size:13px;
}

.vFooter{
position:absolute;
bottom:6%;
left:10%;
right:10%;
text-align:center;
font-size:12px;
}

.actionsRow{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="wrap">

<div id="pageForm">

<h1 class="brand">CÉLINE</h1>
<p class="sub">VIP HOST</p>

<div class="card">

<form id="vipForm">

<label>HOST</label>
<select id="host">
<option value="H01">H01</option>
<option value="H02">H02</option>
<option value="H03">H03</option>
</select>

<label>CELULAR</label>
<input id="celular" required>

<label>NOMBRE</label>
<input id="nombre" required>

<label>APELLIDO</label>
<input id="apellido" required>

<label>CORREO ELECTRÓNICO</label>
<input id="email" required>

<button class="btn" id="btn">GENERAR CÓDIGO VIP</button>

</form>

</div>
</div>

<div id="pageVoucher" class="hidden">

<div class="voucherCanvas" id="voucherCanvas">

<div class="vText vName" id="vNombre"></div>
<div class="vText vMeta" id="vMeta"></div>

<div class="barcodeBox">

<svg id="barcode"></svg>

<div class="vCode" id="vCodigo"></div>

</div>

<div class="benefits">

<ul id="benefList"></ul>

</div>

<div class="vFooter" id="vFooter"></div>

</div>

<div class="actionsRow">

<button class="btn secondary" id="btnNew">NUEVO CÓDIGO</button>

<button class="btn" id="btnDownload">DESCARGAR IMAGEN</button>

</div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbx0JZf7NWpCXEyv03cYeiO_xNYTFqbIZr8856ebWOY0c21Pdtz1FW26wejn8K6iofjLKg/exec"

const form=document.getElementById("vipForm")

form.addEventListener("submit",async(e)=>{

e.preventDefault()

const host=document.getElementById("host").value
const nombre=document.getElementById("nombre").value
const apellido=document.getElementById("apellido").value
const celular=document.getElementById("celular").value
const email=document.getElementById("email").value

const params=new URLSearchParams({host,nombre,apellido,celular,email})

const response=await fetch(`${SCRIPT_URL}?${params}`)

const data=await response.json()

if(!data.codigo){

alert("Error conexión con servidor")
return

}

document.getElementById("pageForm").classList.add("hidden")
document.getElementById("pageVoucher").classList.remove("hidden")

document.getElementById("vNombre").textContent=nombre+" "+apellido

document.getElementById("vMeta").textContent=`Grupo confirmado: 5 personas • Válido hasta 22h30 • Host: ${host}`

document.getElementById("vCodigo").textContent=data.codigo

document.getElementById("vFooter").textContent="Recuerda indicar en la puerta de ingreso y en barra para poder acceder"

document.getElementById("benefList").innerHTML=`
<li>Mesa asegurada</li>
<li>3x2 hasta 00h00</li>
<li>5 shots bienvenida</li>
`

JsBarcode("#barcode",data.codigo,{
format:"CODE128",
displayValue:false,
lineColor:"#FFFFFF",
height:60
})

})

document.getElementById("btnNew").onclick=()=>{

document.getElementById("pageVoucher").classList.add("hidden")
document.getElementById("pageForm").classList.remove("hidden")

}

document.getElementById("btnDownload").onclick=async()=>{

const canvas=await html2canvas(document.getElementById("voucherCanvas"),{scale:2})

const link=document.createElement("a")

link.download="CELINE_VIP_VOUCHER.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>
</html>
