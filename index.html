<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CÉLINE VIP HOST</title>

  <style>
    :root{
      --bg:#070707;
      --gold:#d6b15e;
      --gold2:#b88a2a;
      --card:#0f0f0f;
      --muted:#b9b9b9;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 50% 0%, #1a1306 0%, var(--bg) 55%);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{ width:min(680px, 100%); }
    .brand{ text-align:center; letter-spacing:.35em; font-weight:700; font-size:34px; color:var(--gold); margin:0 0 6px 0; }
    .sub{ text-align:center; color:var(--muted); margin:0 0 18px 0; letter-spacing:.25em; font-weight:600; font-size:14px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(214,177,94,.25);
      box-shadow:0 20px 60px rgba(0,0,0,.55);
      border-radius:18px;
      padding:18px;
    }
    .grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:620px){ .grid{ grid-template-columns:1fr; } }
    label{ font-size:12px; color:var(--muted); display:block; margin:10px 0 6px; }
    input,select{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(214,177,94,.22);
      background: rgba(10,10,10,.65);
      color:#fff;
      outline:none;
    }
    .btn{
      width:100%;
      margin-top:14px;
      padding:12px;
      border:0;
      border-radius:14px;
      background: linear-gradient(90deg, var(--gold2), var(--gold));
      color:#1a1204;
      font-weight:800;
      cursor:pointer;
    }
    .result{
      margin-top:14px;
      border-radius:14px;
      border:1px dashed rgba(214,177,94,.45);
      padding:14px;
      text-align:center;
      display:none;
    }
    .code{
      font-size:18px;
      letter-spacing:.18em;
      font-weight:800;
      color:var(--gold);
      margin-top:8px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1 class="brand">CÉLINE</h1>
    <p class="sub">VIP HOST</p>

    <div class="card">
      <form id="vipForm">
        <div class="grid">
          <div>
            <label>HOST</label>
            <select id="host" required>
              <option value="H01">H01</option>
              <option value="H02">H02</option>
              <option value="H03">H03</option>
            </select>
          </div>
          <div>
            <label>CELULAR</label>
            <input id="celular" type="tel" required />
          </div>
        </div>

        <div class="grid">
          <div>
            <label>NOMBRE</label>
            <input id="nombre" type="text" required />
          </div>
          <div>
            <label>APELLIDO</label>
            <input id="apellido" type="text" required />
          </div>
        </div>

        <div>
          <label>CORREO ELECTRÓNICO</label>
          <input id="email" type="email" required />
        </div>

        <button class="btn" id="btn" type="submit">GENERAR CÓDIGO VIP</button>

        <div class="result" id="resultBox">
          <div>✅ Tu código VIP es:</div>
          <div class="code" id="codigoTxt">—</div>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 🔁 PEGA AQUÍ TU /exec NUEVO (después del redeploy)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5uA7YS22UJ13SjA698IML6B-S4fwhRAx3UXedUSGHzRfBtDA4MMPhC64GfKdozbM1Bw/exec";

    const form = document.getElementById("vipForm");
    const btn  = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      btn.textContent = "GENERANDO...";

      const data = {
        host: document.getElementById("host").value,
        nombre: document.getElementById("nombre").value,
        apellido: document.getElementById("apellido").value,
        celular: document.getElementById("celular").value,
        email: document.getElementById("email").value,
      };

      try {
        // ⚠️ Enviamos como text/plain para evitar preflight
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!result.ok) {
          alert("Error: " + (result.error || "No se pudo generar"));
          console.error(result);
          return;
        }

        document.getElementById("codigoTxt").textContent = result.codigo;
        document.getElementById("resultBox").style.display = "block";
        form.reset();

      } catch (err) {
        alert("Error generando código (conexión).");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "GENERAR CÓDIGO VIP";
      }
    });
  </script>
</body>
</html>
