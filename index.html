<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CÉLINE VIP HOST</title>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#070707;
      --gold:#d6b15e;
      --gold2:#b88a2a;
      --muted:#b9b9b9;
      --stroke: rgba(214,177,94,.22);
      --shadow: rgba(0,0,0,.55);
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 50% 0%, #1a1306 0%, var(--bg) 55%);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{ width:min(720px, 100%); }

    .brand{
      text-align:center;
      letter-spacing: .35em;
      font-weight:800;
      font-size: 34px;
      color: var(--gold);
      margin: 0 0 6px 0;
    }

    .sub{
      text-align:center;
      color: var(--muted);
      margin: 0 0 18px 0;
      letter-spacing:.25em;
      font-weight:700;
      font-size: 14px;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(214,177,94,.25);
      box-shadow: 0 20px 60px var(--shadow);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width:620px){
      .grid{ grid-template-columns:1fr; }
      .brand{ font-size:28px; }
    }

    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin: 10px 0 6px;
      letter-spacing:.08em;
    }

    input, select{
      width:100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(10,10,10,.65);
      color:#fff;
      outline:none;
    }

    input:focus, select:focus{
      border-color: rgba(214,177,94,.55);
      box-shadow: 0 0 0 3px rgba(214,177,94,.12);
    }

    .btn{
      width:100%;
      margin-top:14px;
      padding: 12px 14px;
      border:0;
      border-radius: 14px;
      background: linear-gradient(90deg, var(--gold2), var(--gold));
      color:#1a1204;
      font-weight:900;
      letter-spacing:.12em;
      cursor:pointer;
      transition: transform .06s ease;
    }
    .btn:active{ transform: scale(.99); }
    .btn[disabled]{ opacity:.75; cursor:not-allowed; }

    .btn.secondary{
      background: rgba(10,10,10,.65);
      color: var(--gold);
      border: 1px solid rgba(214,177,94,.35);
      letter-spacing:.10em;
    }

    .note{
      margin-top:10px;
      color: var(--muted);
      font-size: 12px;
      text-align:center;
    }

    /* ---------- VOUCHER VIEW ---------- */
    .hidden{ display:none !important; }

    .voucherWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
    }

    .voucherCanvas{
      width:min(420px, 100%);
      aspect-ratio: 9 / 16;
      border-radius: 22px;
      overflow:hidden;
      position:relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.65);
      border: 1px solid rgba(214,177,94,.25);
      background:#000;
    }

    .bgImg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      display:block;
    }

    .voucherOverlay{
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.28));
      z-index:1;
      pointer-events:none;
    }

    .vText{
      position:absolute;
      left: 10%;
      right: 10%;
      text-align:center;
      text-shadow: 0 2px 18px rgba(0,0,0,.7);
      z-index:2;
      pointer-events:none;
    }

    /* ✅ Aquí mueves tamaño y altura del nombre */
    .vName{
      top: 24%;
      font-weight:900;
      font-size: 18px;     /* baja/sube tamaño */
      letter-spacing:.03em;
      color: rgba(255,255,255,.95);
    }

    /* ✅ Aquí mueves tamaño y altura del “grupo confirmado…” */
    .vMeta{
      top: 30%;
      font-weight:800;
      font-size: 13px;     /* baja/sube tamaño */
      letter-spacing:.01em;
      color: rgba(255,255,255,.88);
    }

    .barcodeBox{
      position:absolute;
      left: 10%;
      right: 10%;
      top: 44%;
      padding: 14px 12px;
      border-radius: 16px;
      background: rgba(0,0,0,.40);
      border: 1px solid rgba(214,177,94,.35);
      backdrop-filter: blur(6px);
      text-align:center;
      z-index:2;
    }

    #barcode{ width:100%; height:72px; }

    .vCode{
      margin-top:10px;
      font-weight:900;
      letter-spacing:.14em;
      color: var(--gold);
      font-size: 14px;
      word-break: break-word;
    }

    .benefits{
      position:absolute;
      left: 10%;
      right: 10%;
      top: 64%;
      padding: 14px 14px;
      border-radius: 16px;
      background: rgba(0,0,0,.34);
      border: 1px dashed rgba(214,177,94,.45);
      backdrop-filter: blur(6px);
      z-index:2;
    }

    .benefits h3{
      margin:0 0 10px 0;
      text-align:center;
      color: var(--gold);
      letter-spacing:.10em;
      font-size: 13px;
      font-weight:900;
    }

    .benefits ul{
      margin:0;
      padding-left: 18px;
      line-height:1.55;
      font-size: 14px;
      font-weight:750;
      color: rgba(255,255,255,.92);
    }

    .vFooter{
      position:absolute;
      left: 10%;
      right: 10%;
      bottom: 7%;
      text-align:center;
      font-size: 12px;
      color: rgba(255,255,255,.80);
      letter-spacing:.02em;
      text-shadow: 0 2px 16px rgba(0,0,0,.85);
      z-index:2;
      pointer-events:none;
    }

    .actionsRow{
      width:min(420px, 100%);
      display:grid;
      gap:10px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width:420px){ .actionsRow{ grid-template-columns: 1fr; } }

    /* Aviso visible si la plantilla no carga */
    .bgFail{
      position:absolute;
      inset:0;
      z-index:3;
      display:none;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      background: rgba(0,0,0,.65);
      color:#fff;
      font-weight:800;
      letter-spacing:.06em;
    }
    .bgFail small{ display:block; margin-top:10px; opacity:.85; font-weight:600; }
  </style>
</head>

<body>
  <div class="wrap">

    <div id="pageForm">
      <h1 class="brand">CÉLINE</h1>
      <p class="sub">VIP HOST</p>

      <div class="card">
        <form id="vipForm">
          <div class="grid">
            <div>
              <label>HOST</label>
              <select id="host" required>
                <option value="H01">H01</option>
                <option value="H02">H02</option>
                <option value="H03">H03</option>
              </select>
            </div>

            <div>
              <label>CELULAR</label>
              <input id="celular" type="tel" placeholder="0999999999" required />
            </div>
          </div>

          <div class="grid">
            <div>
              <label>NOMBRE</label>
              <input id="nombre" type="text" placeholder="Nombre" required />
            </div>

            <div>
              <label>APELLIDO</label>
              <input id="apellido" type="text" placeholder="Apellido" required />
            </div>
          </div>

          <div>
            <label>CORREO ELECTRÓNICO</label>
            <input id="email" type="email" placeholder="correo@ejemplo.com" required />
          </div>

          <button class="btn" id="btn" type="submit">GENERAR CÓDIGO VIP</button>
          <div class="note">Se generará el código y se guardará automáticamente en Google Sheets.</div>
        </form>
      </div>
    </div>

    <div id="pageVoucher" class="hidden">
      <div class="voucherWrap">
        <div class="voucherCanvas" id="voucherCanvas">

          <img id="bgImg" class="bgImg" alt="Plantilla" />

          <div class="voucherOverlay"></div>

          <div class="vText vName" id="vNombre">—</div>
          <div class="vText vMeta" id="vMeta">—</div>

          <div class="barcodeBox">
            <svg id="barcode"></svg>
            <div class="vCode" id="vCodigo">—</div>
          </div>

          <div class="benefits">
            <h3>BENEFICIOS ACTIVADOS</h3>
            <ul id="benefList"></ul>
          </div>

          <div class="vFooter" id="vFooter">
            Recuerda indicar en la puerta de ingreso y en barra para poder acceder.
          </div>

          <div class="bgFail" id="bgFail">
            NO CARGA LA PLANTILLA
            <small>Revisa que exista: plantilla.jpg en GitHub Pages</small>
          </div>

        </div>

        <div class="actionsRow">
          <button class="btn secondary" id="btnNew">NUEVO CÓDIGO</button>
          <button class="btn" id="btnDownload">DESCARGAR IMAGEN</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ✅ Apps Script (tu nuevo)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3RD0iyOuht2NRM3iLJ49Ddtqmhn3a0CnOapO9ZQaSvcFBc-0JPHqOdLiFk6ukUK9y7Q/exec";

    // ✅ Fondo: URL ABSOLUTA (esto evita problemas de rutas)
    const BG_URL = "https://celineciba.github.io/celine-vip-host/plantilla.jpg";

    const form = document.getElementById("vipForm");
    const btn  = document.getElementById("btn");

    const pageForm    = document.getElementById("pageForm");
    const pageVoucher = document.getElementById("pageVoucher");

    const bgImg  = document.getElementById("bgImg");
    const bgFail = document.getElementById("bgFail");

    const PROMO = {
      grupo: "Grupo confirmado: 5 personas",
      valido: "Válido hasta 22h30",
      beneficios: ["Mesa asegurada","3x2 hasta 00h00","5 shots bienvenida"],
      footer: "Recuerda indicar en la puerta de ingreso y en barra para poder acceder."
    };

    function setBgWithBust(){
      bgFail.style.display = "none";
      bgImg.src = BG_URL + "?v=" + Date.now();
    }

    function waitImage(imgEl) {
      return new Promise((resolve) => {
        if (!imgEl) return resolve(false);
        if (imgEl.complete && imgEl.naturalWidth > 0) return resolve(true);
        imgEl.onload = () => resolve(true);
        imgEl.onerror = () => resolve(false);
      });
    }

    function showVoucher({host, nombre, apellido, codigo}) {
      document.getElementById("vNombre").textContent = `${nombre} ${apellido}`.trim();
      document.getElementById("vMeta").textContent   = `${PROMO.grupo} • ${PROMO.valido} • Host: ${host}`;
      document.getElementById("vCodigo").textContent = codigo;
      document.getElementById("vFooter").textContent = PROMO.footer;

      const ul = document.getElementById("benefList");
      ul.innerHTML = "";
      PROMO.beneficios.forEach(b => {
        const li = document.createElement("li");
        li.textContent = b;
        ul.appendChild(li);
      });

      JsBarcode("#barcode", codigo, {
        format: "CODE128",
        displayValue: false,
        margin: 0,
        height: 62
      });

      pageForm.classList.add("hidden");
      pageVoucher.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showFormAgain(){
      pageVoucher.classList.add("hidden");
      pageForm.classList.remove("hidden");
      form.reset();
      btn.disabled = false;
      btn.textContent = "GENERAR CÓDIGO VIP";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function downloadVoucher(){
      const ok = await waitImage(bgImg);
      if (!ok) bgFail.style.display = "flex";

      const node = document.getElementById("voucherCanvas");
      const canvas = await html2canvas(node, {
        useCORS: true,
        backgroundColor: null,
        scale: 2,
        logging: false
      });

      const a = document.createElement("a");
      a.href = canvas.toDataURL("image/png");
      a.download = "CELINE_VIP_VOUCHER.png";
      a.click();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btn.disabled = true;
      btn.textContent = "GENERANDO...";

      const host = document.getElementById("host").value.trim();
      const nombre = document.getElementById("nombre").value.trim();
      const apellido = document.getElementById("apellido").value.trim();
      const celular = document.getElementById("celular").value.trim();
      const email = document.getElementById("email").value.trim();

      const params = new URLSearchParams({ host, nombre, apellido, celular, email });

      // timeout para que no se quede pegado
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      try {
        // siempre reintenta cargar el fondo al entrar al voucher
        setBgWithBust();
        await waitImage(bgImg); // no bloquea si falla, solo intenta

        const url = `${SCRIPT_URL}?${params.toString()}&t=${Date.now()}`;
        const response = await fetch(url, { method: "GET", signal: controller.signal, cache: "no-store" });
        const result = await response.json();

        if (!result.ok) {
          alert("Error: " + (result.error || "No se pudo generar"));
          btn.disabled = false;
          btn.textContent = "GENERAR CÓDIGO VIP";
          return;
        }

        showVoucher({ host, nombre, apellido, codigo: result.codigo });

      } catch (err) {
        alert("Error generando código (conexión o timeout).");
        btn.disabled = false;
        btn.textContent = "GENERAR CÓDIGO VIP";
      } finally {
        clearTimeout(timeout);
      }
    });

    document.getElementById("btnNew").addEventListener("click", showFormAgain);
    document.getElementById("btnDownload").addEventListener("click", downloadVoucher);

    // Inicializa fondo al cargar la web
    setBgWithBust();
    bgImg.addEventListener("error", () => { bgFail.style.display = "flex"; });
  </script>
</body>
</html>
