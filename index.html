<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CÉLINE VIP HOST</title>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#070707;
      --gold:#d6b15e;
      --gold2:#b88a2a;
      --muted:#b9b9b9;
      --stroke: rgba(214,177,94,.22);
      --shadow: rgba(0,0,0,.55);
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 50% 0%, #1a1306 0%, var(--bg) 55%);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{ width:min(720px, 100%); }

    .brand{
      text-align:center;
      letter-spacing: .35em;
      font-weight:800;
      font-size: 34px;
      color: var(--gold);
      margin: 0 0 6px 0;
    }

    .sub{
      text-align:center;
      color: var(--muted);
      margin: 0 0 18px 0;
      letter-spacing:.25em;
      font-weight:700;
      font-size: 14px;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(214,177,94,.25);
      box-shadow: 0 20px 60px var(--shadow);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    @media (max-width:620px){ .grid{ grid-template-columns:1fr; } .brand{ font-size:28px; } }

    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin: 10px 0 6px;
      letter-spacing:.08em;
    }

    input, select{
      width:100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(10,10,10,.65);
      color:#fff;
      outline:none;
    }

    input:focus, select:focus{
      border-color: rgba(214,177,94,.55);
      box-shadow: 0 0 0 3px rgba(214,177,94,.12);
    }

    .btn{
      width:100%;
      margin-top:14px;
      padding: 12px 14px;
      border:0;
      border-radius: 14px;
      background: linear-gradient(90deg, var(--gold2), var(--gold));
      color:#1a1204;
      font-weight:900;
      letter-spacing:.12em;
      cursor:pointer;
    }
    .btn[disabled]{ opacity:.75; cursor:not-allowed; }

    .btn.secondary{
      background: rgba(10,10,10,.65);
      color: var(--gold);
      border: 1px solid rgba(214,177,94,.35);
      letter-spacing:.10em;
    }

    .note{
      margin-top:10px;
      color: var(--muted);
      font-size: 12px;
      text-align:center;
    }

    .hidden{ display:none !important; }

    /* Voucher */
    .voucherWrap{ display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; }

    .voucherCanvas{
      width:min(420px, 100%);
      aspect-ratio: 9 / 16;
      border-radius: 18px;
      overflow:hidden;
      position:relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.65);
      border: 1px solid rgba(214,177,94,.25);
      background:#000;
    }

    /* ✅ Fondo: cover real */
    .bgImg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      z-index:0;
      display:block;
      transform: scale(1.02);
    }

    .voucherOverlay{
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.22));
      z-index:1;
      pointer-events:none;
    }

    .vText{
      position:absolute;
      left: 10%;
      right: 10%;
      text-align:center;
      text-shadow: 0 2px 18px rgba(0,0,0,.75);
      z-index:2;
      pointer-events:none;
      color: rgba(255,255,255,.95);
    }

    /* ✅ Bajados para no tapar "Clientes VIP" */
    .vName{ top: 24%; font-weight:900; font-size: 20px; }
    .vMeta{ top: 31%; font-weight:750; font-size: 14px; line-height:1.25; color: rgba(255,255,255,.85); }

    .barcodeBox{
      position:absolute;
      left: 12%;
      right: 12%;
      top: 44%;
      padding: 12px 12px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.38);
      border: 1px solid rgba(214,177,94,.40);
      backdrop-filter: blur(7px);
      text-align:center;
      z-index:2;
    }

    #barcode{ width:100%; height:78px; }

    .vCode{
      margin-top:10px;
      font-weight:1000;
      letter-spacing:.10em;
      color: var(--gold);
      font-size: 14px;
      word-break: break-word;
    }

    .benefits{
      position:absolute;
      left: 12%;
      right: 12%;
      top: 66%;
      padding: 14px 14px;
      border-radius: 14px;
      background: rgba(0,0,0,.34);
      border: 1px dashed rgba(214,177,94,.55);
      backdrop-filter: blur(7px);
      z-index:2;
    }

    .benefits h3{
      margin:0 0 10px 0;
      text-align:center;
      color: var(--gold);
      letter-spacing:.10em;
      font-size: 13px;
      font-weight:1000;
    }

    .benefits ul{ margin:0; padding-left: 18px; line-height:1.55; font-size: 13.5px; font-weight:750; color: rgba(255,255,255,.92); }
    .benefits li{ margin:4px 0; }

    .vFooter{
      position:absolute;
      left: 12%;
      right: 12%;
      bottom: 7%;
      text-align:center;
      font-size: 12px;
      color: rgba(255,255,255,.80);
      text-shadow: 0 2px 16px rgba(0,0,0,.85);
      z-index:2;
      pointer-events:none;
    }

    .actionsRow{
      width:min(420px, 100%);
      display:grid;
      gap:10px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width:420px){ .actionsRow{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- FORM -->
    <div id="pageForm">
      <h1 class="brand">CÉLINE</h1>
      <p class="sub">VIP HOST</p>

      <div class="card">
        <form id="vipForm">
          <div class="grid">
            <div>
              <label>HOST</label>
              <select id="host" required>
                <option value="H01">H01</option>
                <option value="H02">H02</option>
                <option value="H03">H03</option>
              </select>
            </div>

            <div>
              <label>CELULAR</label>
              <input id="celular" type="tel" placeholder="0999999999" required />
            </div>
          </div>

          <div class="grid">
            <div>
              <label>NOMBRE</label>
              <input id="nombre" type="text" placeholder="Nombre" required />
            </div>

            <div>
              <label>APELLIDO</label>
              <input id="apellido" type="text" placeholder="Apellido" required />
            </div>
          </div>

          <div>
            <label>CORREO ELECTRÓNICO</label>
            <input id="email" type="email" placeholder="correo@ejemplo.com" required />
          </div>

          <button class="btn" id="btn" type="submit">GENERAR CÓDIGO VIP</button>
          <div class="note">Se generará el código y se guardará automáticamente en Google Sheets.</div>
        </form>
      </div>
    </div>

    <!-- VOUCHER -->
    <div id="pageVoucher" class="hidden">
      <div class="voucherWrap">
        <div class="voucherCanvas" id="voucherCanvas">
          <img id="bgImg" class="bgImg" src="plantilla.jpg" crossorigin="anonymous" alt="Plantilla" />
          <div class="voucherOverlay"></div>

          <div class="vText vName" id="vNombre">—</div>
          <div class="vText vMeta" id="vMeta">—</div>

          <div class="barcodeBox">
            <svg id="barcode"></svg>
            <div class="vCode" id="vCodigo">—</div>
          </div>

          <div class="benefits">
            <h3>BENEFICIOS ACTIVADOS</h3>
            <ul id="benefList"></ul>
          </div>

          <div class="vFooter" id="vFooter">Recuerda indicar en la puerta de ingreso y en barra para poder acceder.</div>
        </div>

        <div class="actionsRow">
          <button class="btn secondary" id="btnNew">NUEVO CÓDIGO</button>
          <button class="btn" id="btnDownload">DESCARGAR IMAGEN</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ✅ Pega aquí tu URL ACTUAL de Apps Script (exec)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0JZf7NWpCXEyv03cYeiO_xNYTFqbIZr8856ebWOY0c21Pdtz1FW26wejn8K6iofjLKg/exec";

    const form = document.getElementById("vipForm");
    const btn  = document.getElementById("btn");

    const pageForm    = document.getElementById("pageForm");
    const pageVoucher = document.getElementById("pageVoucher");
    const bgImg = document.getElementById("bgImg");

    const PROMO = {
      grupo: "Grupo confirmado: 5 personas",
      valido: "Válido hasta 22h30",
      beneficios: ["Mesa asegurada","3x2 hasta 00h00","5 shots bienvenida"],
      footer: "Recuerda indicar en la puerta de ingreso y en barra para poder acceder."
    };

    function waitImage(imgEl){
      return new Promise((resolve)=>{
        if (!imgEl) return resolve();
        if (imgEl.complete && imgEl.naturalWidth > 0) return resolve();
        imgEl.onload = ()=>resolve();
        imgEl.onerror = ()=>resolve();
      });
    }

    function showVoucher({host, nombre, apellido, codigo}){
      document.getElementById("vNombre").textContent = `${nombre} ${apellido}`.trim();
      document.getElementById("vMeta").textContent   = `${PROMO.grupo} • ${PROMO.valido} • Host: ${host}`;
      document.getElementById("vCodigo").textContent = codigo;
      document.getElementById("vFooter").textContent = PROMO.footer;

      const ul = document.getElementById("benefList");
      ul.innerHTML = "";
      PROMO.beneficios.forEach(b=>{
        const li=document.createElement("li");
        li.textContent=b;
        ul.appendChild(li);
      });

      // ✅ Barcode seguro: ya viene ASCII desde Apps Script
      JsBarcode("#barcode", codigo, {
        format:"CODE128",
        displayValue:false,
        margin:0,
        height:64,
        lineColor:"#FFFFFF"
      });

      pageForm.classList.add("hidden");
      pageVoucher.classList.remove("hidden");
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function showFormAgain(){
      pageVoucher.classList.add("hidden");
      pageForm.classList.remove("hidden");
      form.reset();
      btn.disabled=false;
      btn.textContent="GENERAR CÓDIGO VIP";
      window.scrollTo({top:0, behavior:"smooth"});
    }

    async function downloadVoucher(){
      await waitImage(bgImg);
      const node=document.getElementById("voucherCanvas");
      const canvas=await html2canvas(node,{
        useCORS:true,
        backgroundColor:null,
        scale:2,
        logging:false
      });
      const a=document.createElement("a");
      a.href=canvas.toDataURL("image/png");
      a.download="CELINE_VIP_VOUCHER.png";
      a.click();
    }

    // ✅ Fetch ROBUSTO: NO se cae si no es JSON perfecto
    async function callScript(params){
      const url = `${SCRIPT_URL}?${params.toString()}`;
      const res = await fetch(url, { method:"GET", cache:"no-store" });

      const raw = await res.text(); // primero texto
      let data = null;
      try { data = JSON.parse(raw); } catch (e) { data = null; }

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}. Respuesta: ${raw.slice(0,200)}`);
      }
      if (!data) {
        throw new Error(`Respuesta NO JSON: ${raw.slice(0,200)}`);
      }
      return data;
    }

    form.addEventListener("submit", async (e)=>{
      e.preventDefault();

      btn.disabled=true;
      btn.textContent="GENERANDO...";

      const host=document.getElementById("host").value.trim();
      const nombre=document.getElementById("nombre").value.trim();
      const apellido=document.getElementById("apellido").value.trim();
      const celular=document.getElementById("celular").value.trim();
      const email=document.getElementById("email").value.trim();

      const params=new URLSearchParams({host,nombre,apellido,celular,email});

      try{
        const result = await callScript(params);

        // ✅ Acepta {ok:true,codigo} (tu script) y también {codigo}
        const codigo = (result && result.codigo) ? result.codigo : "";
        const ok = (typeof result.ok === "boolean") ? result.ok : true;

        if (!ok || !codigo){
          alert("Error: " + (result.error || "No se recibió código"));
          console.error(result);
          btn.disabled=false;
          btn.textContent="GENERAR CÓDIGO VIP";
          return;
        }

        showVoucher({host,nombre,apellido,codigo});

      }catch(err){
        alert("Error generando código: " + err.message);
        console.error(err);
        btn.disabled=false;
        btn.textContent="GENERAR CÓDIGO VIP";
      }
    });

    document.getElementById("btnNew").addEventListener("click", showFormAgain);
    document.getElementById("btnDownload").addEventListener("click", downloadVoucher);

    bgImg.addEventListener("error", ()=>{
      console.error("No se pudo cargar plantilla.jpg. Revisa el nombre exacto y que esté junto a index.html");
    });
  </script>
</body>
</html>
